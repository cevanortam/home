<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CEVA — Southern Region Operations Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ceva-red: #e0201c;
      --ceva-black: #111111;
      --ceva-white: #f5f5f5;
      --card-bg: rgba(10,10,10,0.72);
      --card-border: rgba(255,255,255,0.08);
      --card-hover: rgba(224,32,28,0.14);
      --sub-card-bg: rgba(5,5,5,0.82);
    }

    html, body {
      min-height: 100%;
      font-family: 'Barlow', sans-serif;
      background: var(--ceva-black);
      color: var(--ceva-white);
      overflow-x: hidden;
    }

    /* ── HERO BG ── */
    .hero-bg {
      position: fixed;
      inset: 0;
      background: url('https://cevanortam.github.io/millington/Media.jpg') center center / cover no-repeat;
      z-index: 0;
      transform: scale(1.04);
      animation: slowZoom 30s ease-in-out infinite alternate;
    }
    @keyframes slowZoom {
      from { transform: scale(1.04); }
      to   { transform: scale(1.12); }
    }

    .hero-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(to left,
          rgba(0,0,0,0.95) 0%,
          rgba(0,0,0,0.88) 40%,
          rgba(0,0,0,0.32) 70%,
          rgba(0,0,0,0.10) 100%),
        linear-gradient(to bottom,
          rgba(0,0,0,0.30) 0%,
          rgba(0,0,0,0.18) 50%,
          rgba(0,0,0,0.55) 100%),
        radial-gradient(ellipse at 100% 100%, rgba(224,32,28,0.18) 0%, transparent 60%);
    }

    /* ── PAGE LAYOUT ── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      padding: 56px 60px 100px 24px;
    }

    /* ── HEADER ── */
    header {
      text-align: right;
      margin-bottom: 44px;
      animation: fadeDown 0.8s ease both;
      width: 100%;
      max-width: 1100px;
    }

    .site-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--ceva-red);
      margin-bottom: 18px;
      opacity: 0.9;
    }

    .ceva-logo {
      display: block;
      margin: 0 0 16px auto;
      height: 50px;
      width: auto;
      filter: brightness(0) invert(1);
    }

    .site-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1;
      text-transform: uppercase;
      color: var(--ceva-white);
    }

    .site-title span { color: var(--ceva-red); }

    .site-subtitle {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.40);
      margin-top: 9px;
      text-transform: uppercase;
    }

    .rule {
      width: 40px;
      height: 2px;
      background: var(--ceva-red);
      margin: 16px 0 0 auto;
      border-radius: 2px;
    }

    /* ── REGION GRID (site cards) ── */
    .region-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 1100px;
    }

    /* ── SITE CARD WRAPPER (holds both face & expanded panel) ── */
    .site-wrapper {
      animation: fadeUp 0.6s ease both;
      grid-column: span 1;
    }
    .site-wrapper:nth-child(1) { animation-delay: 0.12s; }
    .site-wrapper:nth-child(2) { animation-delay: 0.22s; }
    .site-wrapper:nth-child(3) { animation-delay: 0.32s; }
    .site-wrapper:nth-child(4) { animation-delay: 0.42s; }
    .site-wrapper:nth-child(5) { animation-delay: 0.52s; }

    /* When a site is expanded it spans full width */
    .site-wrapper.expanded {
      grid-column: 1 / -1;
    }

    /* ── SITE CARD FACE ── */
    .site-card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 4px;
      padding: 26px 24px 20px;
      cursor: pointer;
      color: var(--ceva-white);
      overflow: hidden;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
      user-select: none;
    }

    .site-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(224,32,28,0.12) 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .site-card::after {
      content: '';
      position: absolute;
      left: 0; top: 24%; bottom: 24%;
      width: 3px;
      background: var(--ceva-red);
      border-radius: 0 2px 2px 0;
      opacity: 0;
      transition: opacity 0.3s, top 0.3s, bottom 0.3s;
    }

    .site-card:hover,
    .site-wrapper.expanded .site-card {
      border-color: rgba(224,32,28,0.45);
      background: var(--card-hover);
    }
    .site-card:hover:not(.no-lift) { transform: translateY(-3px); }
    .site-card:hover::before,
    .site-wrapper.expanded .site-card::before { opacity: 1; }
    .site-card:hover::after,
    .site-wrapper.expanded .site-card::after { opacity: 1; top: 8%; bottom: 8%; }

    .site-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .site-card-icon { font-size: 26px; line-height: 1; margin-bottom: 12px; }

    .site-state-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .badge-live    { color: #4caf50; border: 1px solid rgba(76,175,80,0.4); background: rgba(76,175,80,0.10); }
    .badge-dev     { color: #f5a623; border: 1px solid rgba(245,166,35,0.4); background: rgba(245,166,35,0.10); }
    .badge-soon    { color: #888;    border: 1px solid rgba(160,160,160,0.3); background: rgba(160,160,160,0.07); }

    .site-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ceva-red);
      margin-bottom: 4px;
    }

    .site-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .site-meta {
      font-size: 11px;
      font-weight: 300;
      color: rgba(255,255,255,0.38);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    .site-chevron {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      transition: color 0.25s, gap 0.25s;
    }
    .site-card:hover .site-chevron,
    .site-wrapper.expanded .site-card .site-chevron { color: var(--ceva-red); gap: 12px; }

    .site-chevron svg {
      width: 13px; height: 13px; flex-shrink: 0;
      transition: transform 0.3s;
    }
    .site-wrapper.expanded .site-card .site-chevron svg {
      transform: rotate(90deg);
    }

    /* ── EXPANDED PANEL ── */
    .site-panel {
      display: none;
      margin-top: 10px;
      background: rgba(6,6,6,0.80);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 28px 28px 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      animation: panelOpen 0.35s ease both;
    }
    .site-wrapper.expanded .site-panel { display: block; }

    @keyframes panelOpen {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .panel-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .panel-title span { color: var(--ceva-red); }

    .panel-close {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      cursor: pointer;
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 2px;
      transition: color 0.2s, border-color 0.2s;
      background: none;
    }
    .panel-close:hover { color: var(--ceva-red); border-color: rgba(224,32,28,0.40); }

    /* ── SUB-CARD GRID ── */
    .sub-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .sub-card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: rgba(14,14,14,0.78);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 3px;
      padding: 18px 16px 14px;
      text-decoration: none;
      color: var(--ceva-white);
      overflow: hidden;
      transition: border-color 0.22s, background 0.22s, transform 0.2s;
    }

    .sub-card::after {
      content: '';
      position: absolute;
      left: 0; top: 30%; bottom: 30%;
      width: 2px;
      background: var(--ceva-red);
      border-radius: 0 2px 2px 0;
      opacity: 0;
      transition: opacity 0.25s, top 0.3s, bottom 0.3s;
    }

    .sub-card:hover {
      border-color: rgba(224,32,28,0.38);
      background: rgba(224,32,28,0.10);
      transform: translateY(-3px);
    }
    .sub-card:hover::after { opacity: 1; top: 10%; bottom: 10%; }

    /* non-link sub-cards (coming soon / dev) */
    .sub-card.no-link {
      cursor: default;
      pointer-events: none;
      opacity: 0.55;
    }

    .sub-card-badge {
      display: inline-block;
      margin-bottom: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 2px;
    }
    .sub-card-badge.dev  { color: #f5a623; border: 1px solid rgba(245,166,35,0.45); background: rgba(245,166,35,0.10); }
    .sub-card-badge.soon { color: #888; border: 1px solid rgba(160,160,160,0.3); background: rgba(160,160,160,0.07); }

    .sub-icon { font-size: 18px; margin-bottom: 10px; line-height: 1; }

    .sub-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ceva-red);
      margin-bottom: 3px;
    }

    .sub-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.15;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .sub-desc {
      font-size: 10px;
      font-weight: 300;
      color: rgba(255,255,255,0.38);
      line-height: 1.5;
      margin-top: 6px;
    }

    .sub-arrow {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      transition: color 0.22s, gap 0.22s;
    }
    .sub-card:hover .sub-arrow { color: var(--ceva-red); gap: 10px; }
    .sub-arrow svg { width: 11px; height: 11px; flex-shrink: 0; }

    /* ── FOOTER ── */
    footer {
      margin-top: 48px;
      text-align: right;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.16);
      width: 100%;
      max-width: 1100px;
      animation: fadeUp 0.6s 0.9s ease both;
    }





    .tab-pane { display: none; }
    .tab-pane.active { display: block; }



    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .region-grid { grid-template-columns: repeat(2, 1fr); }
      .sub-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .page { padding: 40px 24px 90px; align-items: stretch; }
      header { text-align: left; }
      .ceva-logo { margin: 0 0 14px 0; }
      .rule { margin: 14px 0 0 0; }
      .region-grid { grid-template-columns: 1fr; }
      .sub-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 420px) {
      .sub-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <div class="page">
    <header>
      <p class="site-eyebrow">CEVA Logistics — Southern Region</p>
      <img class="ceva-logo"
        src="https://www.freelogovectors.net/wp-content/uploads/2022/07/ceva-logistics-logo-freelogovectors.net_.png"
        alt="CEVA Logistics" />
      <h1 class="site-title">Southern Region <span>Hub</span></h1>
      <p class="site-subtitle">Operations Dashboard Portal &mdash; Select a Facility</p>
      <div class="rule"></div>
    </header>

    <!-- Region grid is rendered by JS -->
    <div class="region-grid" id="regionGrid"></div>

    <footer>CEVA Logistics &mdash; Southern Region &mdash; Internal Use Only</footer>
  </div>




<script>
// ── DATA MODEL ──────────────────────────────────────────────────────────────
const defaultData = {
  sites: [
    {
      id: 'millington',
      name: 'Millington, TN',
      region: 'Tennessee',
      icon: '🏭',
      status: 'live',
      cards: [
        { id: 'prod', icon: '📊', label: 'Performance', title: 'Productivity', desc: 'Associate output metrics, KPI tracking, and leaderboard standings.', url: 'https://cevanortam.github.io/millington/productivity.html', status: 'none' },
        { id: 'audit', icon: '🎯', label: 'Quality', title: 'Picking & Audit Accuracy', desc: 'Error rates, audit scores, and accuracy trends across pick operations.', url: 'https://cevanortam.github.io/millington/auditdashboard.html', status: 'none' },
        { id: 'warehouse', icon: '🏭', label: 'Operations', title: 'Warehouse Activity', desc: 'Real-time floor activity, throughput, and shift-level volume snapshots.', url: 'https://cevanortam.github.io/millington/warehouseactivity.html', status: 'none' },
        { id: 'vas', icon: '📦', label: 'Value-Added Services', title: 'VAS Order Tracker', desc: 'Live order status, progress tracking, and completion rates for VAS.', url: 'https://cevanortam.github.io/millington/vas.html', status: 'none' },
        { id: 'staging', icon: '🗂️', label: 'Staging', title: 'VAS Staging (IMStaging)', desc: 'Inbound staging queue management and IM workflow visibility.', url: 'https://cevanortam.github.io/millington/imstaging.html', status: 'dev' },
        { id: 'assets', icon: '🔧', label: 'Inventory', title: 'Asset Tracking', desc: 'Device check-in/out, utilization rates, and equipment location history.', url: 'https://cevanortam.github.io/millington/assets.html', status: 'none' },
        { id: 'forecast', icon: '📈', label: 'Value-Added Services', title: 'VAS Forecast vs Shipped', desc: 'Forecast accuracy, shipped volume comparisons, and variance tracking for VAS.', url: 'https://cevanortam.github.io/millington/vasforecast.html', status: 'none' },
        { id: 'personalization', icon: '✨', label: 'Value-Added Services', title: 'Personalization', desc: 'VAS personalization order tracking, workflow status, and completion metrics.', url: 'https://cevanortam.github.io/millington/personalization.html', status: 'none' },
        { id: 'orders', icon: '📋', label: 'Orders', title: 'Open Order Status', desc: 'Current open orders, fulfillment status, and outstanding order visibility.', url: 'https://cevanortam.github.io/millington/orders.html', status: 'none' }
      ]
    },
    {
      id: 'memphis',
      name: 'Memphis, TN',
      region: 'Tennessee',
      icon: '🎵',
      status: 'soon',
      cards: []
    },
    {
      id: 'atlanta',
      name: 'Atlanta, GA',
      region: 'Georgia',
      icon: '🍑',
      status: 'soon',
      cards: []
    },
    {
      id: 'whitsett',
      name: 'Whitsett, NC',
      region: 'North Carolina',
      icon: '🌲',
      status: 'live',
      cards: [
        { id: 'whitsett_warehouse', icon: '🏭', label: 'Operations', title: 'Warehouse Dashboard', desc: 'Real-time floor activity, throughput, and shift-level volume snapshots.', url: 'https://cevanortam.github.io/whitsettdashboard/warehouse_dashboard.html', status: 'none' },
        { id: 'whitsett_inventory', icon: '🔍', label: 'Inventory', title: 'Inventory Discrepancies', desc: 'Inventory variance tracking, discrepancy reporting, and reconciliation status.', url: 'https://cevanortam.github.io/whitsett/inventorydiscrepancy.html', status: 'none' }
      ]
    },
    {
      id: 'miami',
      name: 'Miami, FL',
      region: 'Florida',
      icon: '🌴',
      status: 'soon',
      cards: []
    }
  ]
};

let appData = JSON.parse(JSON.stringify(defaultData));
let expandedSiteId = null;

// ── RENDER REGION GRID ───────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('regionGrid');
  grid.innerHTML = '';

  appData.sites.forEach((site, idx) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'site-wrapper';
    wrapper.style.animationDelay = (0.10 + idx * 0.10) + 's';
    wrapper.dataset.siteId = site.id;
    if (expandedSiteId === site.id) wrapper.classList.add('expanded');

    const badgeMap = { live: '<span class="site-state-badge badge-live">Live</span>', dev: '<span class="site-state-badge badge-dev">In Development</span>', soon: '<span class="site-state-badge badge-soon">Coming Soon</span>' };

    const card = document.createElement('div');
    card.className = 'site-card';
    card.innerHTML = `
      <div>
        <div class="site-card-top">
          <div class="site-card-icon">${site.icon || '🏭'}</div>
          ${badgeMap[site.status] || ''}
        </div>
        <div class="site-label">${site.region || 'Facility'}</div>
        <div class="site-name">${site.name}</div>
        <div class="site-meta">${site.cards.length} Dashboard${site.cards.length !== 1 ? 's' : ''} Available</div>
      </div>
      <div class="site-chevron">
        ${site.status === 'soon' ? 'Coming Soon' : 'View Dashboards'}
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 8h10M9 4l4 4-4 4"/>
        </svg>
      </div>
    `;

    if (site.status !== 'soon') {
      card.addEventListener('click', () => toggleSite(site.id));
    } else {
      card.style.cursor = 'default';
      card.style.opacity = '0.55';
    }

    // Expanded panel
    const panel = document.createElement('div');
    panel.className = 'site-panel';
    panel.innerHTML = buildPanel(site);

    wrapper.appendChild(card);
    wrapper.appendChild(panel);
    grid.appendChild(wrapper);
  });
}

function buildPanel(site) {
  const subCards = site.cards.map(card => {
    const isNoLink = !card.url || card.status === 'soon';
    const badgeHtml = card.status === 'dev'
      ? `<span class="sub-card-badge dev">⚠ In Development</span>`
      : card.status === 'soon'
      ? `<span class="sub-card-badge soon">Coming Soon</span>`
      : '';

    return `
      <${isNoLink ? 'div' : 'a'} class="sub-card${isNoLink ? ' no-link' : ''}" ${!isNoLink ? `href="${card.url}" target="_blank" rel="noopener"` : ''}>
        <div>
          ${badgeHtml}
          <div class="sub-icon">${card.icon || '📄'}</div>
          <div class="sub-label">${card.label || ''}</div>
          <div class="sub-title">${card.title}</div>
          <div class="sub-desc">${card.desc || ''}</div>
        </div>
        <div class="sub-arrow">Open <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg></div>
      </${isNoLink ? 'div' : 'a'}>
    `;
  }).join('');

  const emptyMsg = site.cards.length === 0
    ? `<div style="font-size:12px;color:rgba(255,255,255,0.28);letter-spacing:0.1em;font-style:italic;">No dashboards configured yet.</div>`
    : '';

  return `
    <div class="panel-header">
      <div class="panel-title">Dashboards — <span>${site.name}</span></div>
      <button class="panel-close" onclick="toggleSite('${site.id}')">✕ Collapse</button>
    </div>
    <div class="sub-grid">${subCards}${emptyMsg}</div>
  `;
}

function toggleSite(id) {
  if (expandedSiteId === id) {
    expandedSiteId = null;
  } else {
    expandedSiteId = id;
  }
  renderGrid();
  if (expandedSiteId) {
    const wrapper = document.querySelector(`[data-site-id="${id}"]`);
    if (wrapper) {
      setTimeout(() => wrapper.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }
  }
}



// ── INIT ─────────────────────────────────────────────────────────────────────
renderGrid();
</script>
</body>
</html>
